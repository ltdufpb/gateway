name: Build and Push Docker Image

on:
  push:
    branches:
      - 'release/dev'
      - 'release/qa'
      - 'release/prd'
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rer-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment tag
        id: set-tag
        run: |
          case "${{ github.ref_name }}" in
            release/dev)
              echo "tag=dev" >> $GITHUB_OUTPUT
              ;;
            release/qa)
              echo "tag=qa" >> $GITHUB_OUTPUT
              ;;
            release/prd)
              echo "tag=prd" >> $GITHUB_OUTPUT
              ;;
            main)
              echo "tag=latest" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
